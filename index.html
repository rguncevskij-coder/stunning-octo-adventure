<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 2px solid #0f0; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #0f0; background: #000; color: #fff; border-radius: 8px; }
        button { width: 95%; padding: 15px; background: #0f0; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; min-height: 200px; }
        img { width: 100%; border-radius: 10px; border: 1px solid #333; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI IMAGE GEN</h2>
        <input type="text" id="userQuery" placeholder="Опиши картинку (на английском)">
        <button onclick="generate()">СОЗДАТЬ</button>
        <div id="output">Здесь появится результат</div>
    </div>

    <script>
        function generate() {
            const query = document.getElementById('userQuery').value;
            const output = document.getElementById('output');
            
            if (!query) {
                alert("Напиши что-нибудь!");
                return;
            }

            output.innerHTML = '<p class="loading">Нейросеть рисует... Подожди 5-10 секунд...</p>';

            // Генерируем случайное число, чтобы картинки всегда были разными
            const randomSeed = Math.floor(Math.random() * 100000);
            
            // Прямая ссылка на генератор
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(query)}?width=1024&height=1024&seed=${randomSeed}&model=flux`;

            // Создаем картинку в памяти, чтобы дождаться загрузки
            const img = new Image();
            img.src = imageUrl;

            img.onload = function() {
                output.innerHTML = ''; // Убираем текст загрузки
                output.appendChild(img);
            };

            img.onerror = function() {
                output.innerHTML = '<p style="color:red">Ошибка. Попробуй другой запрос или проверь интернет.</p>';
            };
        }
    </script>
</body>
</html>
